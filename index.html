<!DOCTYPE html>
<html lang="pt-br">
<head>

<script>

n.callMethod.apply(n,arguments):n.queue.push(arguments)};

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  height: 100vh;
  background: #E74B2E;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
}
.container {
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 25px;
}
.audio-box {
  width: 90%;
  background: #f1f1f1;
  border-radius: 20px;
  padding: 15px;
  display: flex;
  align-items: center;
  gap: 15px;
}
.play-btn {
  width: 45px;
  height: 45px;
  background: #E74B2E;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  cursor: pointer;
}
.audio-info { flex:1; }
.bar { height:6px;background:#ccc;border-radius:10px;overflow:hidden;}
.progress {height:100%;width:0;background:#999;}
.time {font-size:14px;margin-top:5px;}
.botao-cupom,.botao-shopee{
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:20px;
}
.botao-cupom{width:90%;height:90px;background:black;color:white;font-size:22px;}
.botao-shopee{width:70%;height:80px;background:#f1f1f1;color:#E74B2E;font-size:26px;}
</style>

</head>

<body>

<div class="container">
  <div class="audio-box">
    <div class="play-btn" id="playBtn">▶</div>
    <div class="audio-info">
      <div class="bar"><div class="progress" id="progress"></div></div>
      <div class="time" id="time">0:00</div>
    </div>
  </div>

  <div class="botao-cupom" id="btnCupom">
    Clique aqui e copie o cupom de 20% OFF
  </div>

  <div class="botao-shopee" id="btnShopee">
    Abrir a Shopee
  </div>
</div>

<audio id="audio" src="audio.mp3"></audio>

<script>
(function(){

const LINK = "https://s.shopee.com.br/4qBaEnyoyr";
const API = "https://shopee-utm-tracker.onrender.com";
const BASE = "N33T07";
const CUPOM = "LOJARASANT507AF";

let percent="",tempo=0,tempoLabel="",player=false;
let disparouS30=false;

/* FLAGS */
let clickRight=false;
let tempoS0a1=false;
let evento01Disparado=false;
let evento02Disparado=false;

/* PLAYER */
const audio=document.getElementById("audio");
const btn=document.getElementById("playBtn");
const prog=document.getElementById("progress");
const time=document.getElementById("time");

btn.onclick=()=>{
  player=true;
  fbq('trackCustom','PlayerClick');
  audio.paused?(audio.play(),btn.innerText="❚❚"):(audio.pause(),btn.innerText="▶");
};

/* TEMPO */
function dispararTempo(){
  tempo+=1;

  if(tempo<=30){
    tempoLabel="S"+(tempo-1)+"a"+tempo;
    fbq('trackCustom',"Tempo_"+tempoLabel);
  }else if(!disparouS30){
    tempoLabel="S30";
    fbq('trackCustom',"Tempo_S30");
    disparouS30=true;
  }

  if(tempoLabel==="S0a1"){
    tempoS0a1=true;
    checkEvento01();
    checkEvento02();
  }
}

dispararTempo();
setInterval(dispararTempo,1000);

/* EVENTO01 */
function checkEvento01(){
  if(clickRight && tempoS0a1 && !evento01Disparado){
    fbq('trackCustom','EVENTO01');
    evento01Disparado=true;
  }
}

/* EVENTO02 */
function checkEvento02(){
  if(clickRight && tempoS0a1 && !evento02Disparado){
    fbq('trackCustom','EVENTO02');
    evento02Disparado=true;
  }
}

/* UTIL */
function clean(s){return s.replace(/[^a-zA-Z0-9]/g,"");}

/* CLICK */
function go(e,el,tipo){
  const r=el.getBoundingClientRect();
  const x=e.clientX-r.left;
  const w=r.width;

  let pos=x<w*0.3?"Left":x>w*0.7?"Right":"Center";

  let id=BASE;

  if(tipo==="cupom"){
    fbq('track',"InitiateCheckout");
    navigator.clipboard.writeText(CUPOM);
    el.innerText="Copiado!";
  }else{
    fbq('track',"ViewContent");

    if(pos==="Right"){
      clickRight=true;
      checkEvento01();
      checkEvento02();
    }

    el.innerText="Redirecionando...";
  }

  const url=API+"?link="+encodeURIComponent(LINK)+"&uc="+id;
  setTimeout(()=>{window.location.href=url},150);
}

document.getElementById("btnCupom").onclick=function(e){go(e,this,"cupom");};
document.getElementById("btnShopee").onclick=function(e){go(e,this,"normal");};

})();
</script>

</body>
</html>
